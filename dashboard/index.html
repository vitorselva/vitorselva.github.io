<!doctype html>
<html lang="pt-br">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Pipeline Dashboard</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
	<style>
		:root { --bg:#0b0d10; --panel:#12161c; --muted:#8b94a7; --text:#e6edf3; --accent:#6ab0ff; }
		* { box-sizing: border-box; }
		body { margin:0; font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); }
		header { padding: 16px 20px; border-bottom: 1px solid #1e232b; display:flex; align-items:center; justify-content:space-between; }
		header h1 { margin:0; font-size:18px; }
		.container { max-width: 1100px; margin: 0 auto; padding: 20px; }
		.controls { display:flex; gap:12px; align-items:center; margin-bottom: 16px; }
		select, button { background: var(--panel); color: var(--text); border: 1px solid #242a33; border-radius:8px; padding:10px 12px; }
		button { cursor:pointer; }
		table { width: 100%; border-collapse: collapse; }
		th, td { padding: 10px 8px; border-bottom: 1px solid #1e232b; font-size: 14px; }
		th { text-align:left; color: var(--muted); font-weight:600; }
		tr:hover { background: #0f1319; }
		.status { padding: 4px 8px; border-radius: 999px; font-size: 12px; font-weight:600; }
		.s-new { background:#232a36; color:#9fb0c9; }
		.s-processing { background:#2b3140; color:#9cc3ff; }
		.s-ready { background:#22322a; color:#8bd7a5; }
		.s-published { background:#24322a; color:#a5e1b2; }
		.s-failed { background:#3a2323; color:#ff9c9c; }
		.thumb { width: 80px; height: 45px; background:#232a36; border-radius:6px; object-fit:cover; }
		.meta { color: var(--muted); font-size:12px; }
		.badge { background:#232a36; color:#9fb0c9; padding:2px 6px; font-size:12px; border-radius:6px; }
		.footer { color: var(--muted); font-size:12px; margin-top: 12px; }
	</style>
</head>
<body>
	<header>
		<h1>Pipeline Dashboard</h1>
		<div class="controls">
			<label for="refresh">Atualizar</label>
			<select id="refresh">
				<option value="0">Manual</option>
				<option value="5">5s</option>
				<option value="15" selected>15s</option>
				<option value="30">30s</option>
			</select>
			<button id="reload">Recarregar</button>
		</div>
	</header>
	<div class="container">
		<table>
			<thead>
				<tr>
					<th>Vídeo</th>
					<th>Status</th>
					<th>Clipes</th>
					<th>Publicado</th>
					<th>Duração</th>
				</tr>
			</thead>
			<tbody id="rows">
				<tr><td colspan="5" class="meta">Carregando…</td></tr>
			</tbody>
		</table>
		<div class="footer">Clique em uma linha para ver detalhes do job (em breve).</div>
	</div>
	<script>
		const rows = document.getElementById('rows');
		const select = document.getElementById('refresh');
		const btn = document.getElementById('reload');
		let timer = null;

		function fmtDur(d) {
			if (!d && d !== 0) return '-';
			const s = Math.floor(d % 60).toString().padStart(2,'0');
			const m = Math.floor((d/60)%60).toString().padStart(2,'0');
			const h = Math.floor(d/3600);
			return h ? `${h}:${m}:${s}` : `${m}:${s}`;
		}

		function statusClass(s){
			return {
				'new':'s-new', 'processing':'s-processing', 'ready':'s-ready', 'published':'s-published', 'failed':'s-failed'
			}[s] || 's-new';
		}

		async function load(){
			try{
				const res = await fetch('/api/jobs');
				const data = await res.json();
				if(!Array.isArray(data)) throw new Error('Resposta inválida');
				rows.innerHTML = '';
				for(const j of data){
					const tr = document.createElement('tr');
					const thumb = j.thumbnail_url ? `<img class=thumb src="${j.thumbnail_url}"/>` : `<div class=thumb></div>`;
					tr.innerHTML = `
						<td>
							<div style="display:flex; gap:10px; align-items:center;">
								${thumb}
								<div>
									<div style="font-weight:600; white-space:nowrap; text-overflow:ellipsis; overflow:hidden; max-width:520px;">${j.source_title}</div>
									<div class="meta">${j.source_channel} · <a href="${j.source_url}" target="_blank">YouTube</a></div>
								</div>
							</div>
						</td>
						<td><span class="status ${statusClass(j.status)}">${j.status}</span></td>
						<td><span class="badge">${j.clip_count}</span></td>
						<td><span class="badge">${j.published_count}</span></td>
						<td>${fmtDur(j.duration_s)}</td>
					`;
					rows.appendChild(tr);
				}
			}catch(err){
				rows.innerHTML = `<tr><td colspan=5 class=meta>Erro: ${err.message}</td></tr>`;
			}
		}

		function applyTimer(){
			if(timer){ clearInterval(timer); timer = null; }
			const s = parseInt(select.value, 10);
			if(s>0){ timer = setInterval(load, s*1000); }
		}

		select.addEventListener('change', applyTimer);
		btn.addEventListener('click', load);
		load();
		applyTimer();
	</script>
</body>
</html>
